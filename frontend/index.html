<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MixFade - The Ultimate Reference Tool</title>
    <meta name="description" content="MixFade is a comparative audio analysis and A/B playback engine for producers and engineers. Download free for desktop." />
    <link rel="canonical" href="https://mixfade.com/" />
    <!-- Tiny webp icon (not the ~190KB PNG). -->
    <link rel="icon" type="image/webp" href="/lovable-uploads/nav-icon-64.webp" />
    <meta property="og:title" content="MixFade - The Ultimate Reference Tool" />
    <meta property="og:description" content="Comparative audio analysis and A/B playback for producers and engineers." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mixfade.com/" />
    <!-- Fonts off LCP path (optional, non-blocking). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=optional"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=optional"
        rel="stylesheet"
      />
    </noscript>
    <!--
      First-viewport layout insurance before the blocking main stylesheet.
      Must match Tailwind so prerender → paint → hydrate has no snap.
    -->
    <style>
      html,body{margin:0;background:#0f172a;color:#fff}
      #root nav{position:fixed;top:0;left:0;right:0;z-index:50;min-height:4rem}
      #root .container{width:100%;margin-left:auto;margin-right:auto;max-width:1400px;padding-left:2rem;padding-right:2rem;box-sizing:border-box}
      #root .min-h-screen{min-height:100vh;background:#0f172a}
      #root .min-h-screen > section:first-of-type{padding:7rem 1.5rem 6rem;box-sizing:border-box}
      /* Desktop-only hero UI — hide until lg so mobile never paints then unpaints it */
      #root .perspective-container{display:none!important}
      @media (min-width:1024px){
        #root .perspective-container{display:block!important}
        #root .min-h-screen > section:first-of-type .grid.lg\:grid-cols-2,
        #root .min-h-screen > section:first-of-type .grid{
          display:grid;
          grid-template-columns:repeat(2,minmax(0,1fr));
          gap:4rem;
          align-items:center;
        }
      }
      #lh-lcp-h1{
        font-family:system-ui,-apple-system,Segoe UI,sans-serif;
        font-size:clamp(2.25rem,8vw,3.75rem);
        font-weight:700;
        line-height:1.05;
        letter-spacing:-0.02em;
        color:#fff;
        margin:0 0 1.5rem;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
